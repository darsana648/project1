name: Django CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run migrations
      run: |
        python manage.py migrate

    - name: Run tests (optional)
      run: |
        python manage.py test

    - name: Reload PythonAnywhere app
      run: |
        curl -X POST https://www.pythonanywhere.com/api/v0/user/darsana/webapps/darsana.pythonanywhere.com/reload/ \
        -H "Authorization: Token ${{ secrets.PA_TOKEN }}"